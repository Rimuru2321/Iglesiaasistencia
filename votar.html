<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votación · Iglesia Luz y Vida IV</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C8A96E;--gold-b:#E4CF96;--gold-d:#7A6235;--ink:#080C14;--ink-mid:#0F1624;--ink-soft:#182030;--cream:#EEE6D4;--cream-s:#B8A888;--emerald:#1A6647;--border:rgba(200,169,110,.15);--border-hi:rgba(200,169,110,.42);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(200,169,110,.1) 0%,transparent 62%);pointer-events:none;}
.wrap{position:relative;z-index:1;max-width:520px;width:100%;}
.card{background:var(--ink-mid);border:1px solid var(--border-hi);border-radius:24px;padding:44px 36px;position:relative;overflow:hidden;box-shadow:0 32px 100px rgba(0,0,0,.75);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:200px;background:radial-gradient(ellipse at 50% -15%,rgba(200,169,110,.1) 0%,transparent 68%);pointer-events:none;}
.logo{width:64px;height:64px;border-radius:50%;background:#fff;border:3px solid var(--gold);overflow:hidden;margin:0 auto 20px;display:block;}
.logo img{width:100%;height:100%;object-fit:contain;}
.pregunta{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,4vw,28px);font-weight:600;color:var(--cream);text-align:center;margin-bottom:6px;position:relative;z-index:1;}
.sub{font-size:11px;color:var(--cream-s);letter-spacing:2px;text-align:center;text-transform:uppercase;margin-bottom:32px;position:relative;z-index:1;}

.opciones{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;position:relative;z-index:1;}
.opcion{
  padding:16px 20px;border-radius:12px;
  border:1.5px solid var(--border);background:rgba(200,169,110,.04);
  cursor:pointer;transition:all .25s;font-size:15px;color:var(--cream);
  display:flex;align-items:center;gap:12px;
}
.opcion:hover{border-color:var(--border-hi);background:rgba(200,169,110,.08);}
.opcion.selected{border-color:var(--gold);background:rgba(200,169,110,.12);}
.opcion.selected::before{content:'✓';color:var(--gold);font-weight:700;font-size:16px;min-width:20px;}
.opcion:not(.selected)::before{content:'○';color:var(--cream-s);min-width:20px;}

.btn-votar{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-d),var(--gold));border:none;border-radius:12px;color:var(--ink);font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .25s;position:relative;z-index:1;}
.btn-votar:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,169,110,.4);}
.btn-votar:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* Resultados */
.resultado-opcion{margin-bottom:14px;position:relative;z-index:1;}
.res-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.res-nombre{color:var(--cream);}
.res-pct{color:var(--gold);font-weight:600;}
.res-bar{height:10px;background:var(--ink-soft);border-radius:5px;overflow:hidden;}
.res-fill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:5px;transition:width 1.2s ease-out;}
.res-fill.winner{background:linear-gradient(90deg,#1A6647,#5DC99A);}

.gracias{text-align:center;padding:20px 0;position:relative;z-index:1;}
.gracias .check{width:72px;height:72px;border-radius:50%;background:rgba(26,102,71,.2);border:2px solid var(--emerald);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.gracias h3{font-family:'Cormorant Garamond',serif;font-size:24px;color:#5DC99A;margin-bottom:8px;}
.gracias p{color:var(--cream-s);font-size:13px;letter-spacing:1px;}
.btn-ver-res{margin-top:20px;padding:12px 28px;border-radius:100px;border:1px solid var(--border-hi);background:transparent;color:var(--gold);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-ver-res:hover{background:rgba(200,169,110,.08);}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo"><img src="logo.png" alt="Logo"></div>
    <div id="loading" style="text-align:center;padding:40px;color:var(--cream-s);letter-spacing:2px;">Cargando votación...</div>
    <div id="voto-view" style="display:none;">
      <div class="pregunta" id="v-pregunta"></div>
      <div class="sub">Iglesia Luz y Vida IV · Selecciona tu opción</div>
      <div class="opciones" id="v-opciones"></div>
      <button class="btn-votar" id="btn-votar" onclick="enviarVoto()" disabled>Votar</button>
    </div>
    <div id="gracias-view" style="display:none;">
      <div class="gracias">
        <div class="check">✓</div>
        <h3>¡Voto Registrado!</h3>
        <p>Gracias por participar</p>
        <button class="btn-ver-res" onclick="mostrarResultados()">Ver Resultados</button>
      </div>
    </div>
    <div id="resultados-view" style="display:none;">
      <div class="pregunta" id="r-pregunta" style="margin-bottom:24px;"></div>
      <div id="r-opciones"></div>
      <a href="kiosco.html" style="display:block;text-align:center;margin-top:24px;color:var(--cream-s);font-size:12px;letter-spacing:2px;text-decoration:none;">← Volver al Kiosco</a>
    </div>
    <div id="error-view" style="display:none;text-align:center;padding:40px;">
      <div style="font-size:36px;margin-bottom:16px;">⚠️</div>
      <p style="color:#F07080;letter-spacing:1px;">Votación no encontrada</p>
      <a href="kiosco.html" style="display:block;margin-top:20px;color:var(--cream-s);font-size:12px;letter-spacing:2px;text-decoration:none;">← Volver</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyA-XTJPcNGJN1cHKANF7ShwIW68vQ4V_OQ",authDomain:"iglesia-luz-vida.firebaseapp.com",projectId:"iglesia-luz-vida",storageBucket:"iglesia-luz-vida.firebasestorage.app",messagingSenderId:"2442440076",appId:"1:2442440076:web:6ec7c5643d3af4fd57faa9"};
const db=getFirestore(initializeApp(firebaseConfig));

const params=new URLSearchParams(window.location.search);
const votacionId=params.get('id');
let votacion=null,selectedIdx=null;
const yaVoto=localStorage.getItem('voto-'+votacionId);

async function cargar(){
  if(!votacionId){mostrarError();return;}
  try{
    const snap=await getDoc(doc(db,'votaciones',votacionId));
    if(!snap.exists()){mostrarError();return;}
    votacion={id:snap.id,...snap.data()};
    document.getElementById('loading').style.display='none';
    if(yaVoto){mostrarResultadosData();}
    else{mostrarVoto();}
  }catch(e){mostrarError();}
}

function mostrarVoto(){
  document.getElementById('voto-view').style.display='block';
  document.getElementById('v-pregunta').textContent=votacion.pregunta;
  const cont=document.getElementById('v-opciones');
  cont.innerHTML=(votacion.opciones||[]).map((o,i)=>`<div class="opcion" id="op-${i}" onclick="seleccionar(${i})">${o.texto}</div>`).join('');
}

window.seleccionar=function(idx){
  selectedIdx=idx;
  document.querySelectorAll('.opcion').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  document.getElementById('btn-votar').disabled=false;
};

window.enviarVoto=async function(){
  if(selectedIdx===null)return;
  const btn=document.getElementById('btn-votar');btn.disabled=true;
  try{
    // Incrementar votos de la opción seleccionada
    const opciones=[...votacion.opciones];
    opciones[selectedIdx]={...opciones[selectedIdx],votos:(opciones[selectedIdx].votos||0)+1};
    await updateDoc(doc(db,'votaciones',votacionId),{opciones});
    votacion.opciones=opciones;
    localStorage.setItem('voto-'+votacionId,'1');
    document.getElementById('voto-view').style.display='none';
    document.getElementById('gracias-view').style.display='block';
  }catch(e){btn.disabled=false;alert('Error al votar: '+e.message);}
};

window.mostrarResultados=function(){
  document.getElementById('gracias-view').style.display='none';
  mostrarResultadosData();
};

function mostrarResultadosData(){
  document.getElementById('resultados-view').style.display='block';
  document.getElementById('r-pregunta').textContent='📊 '+votacion.pregunta;
  const opciones=votacion.opciones||[];
  const total=opciones.reduce((s,o)=>s+(o.votos||0),0);
  const maxVotos=Math.max(...opciones.map(o=>o.votos||0));
  document.getElementById('r-opciones').innerHTML=opciones.map(o=>{
    const pct=total?Math.round((o.votos||0)/total*100):0;
    const winner=(o.votos||0)===maxVotos&&maxVotos>0;
    return`<div class="resultado-opcion">
      <div class="res-label">
        <span class="res-nombre">${winner?'🏆 ':''}${o.texto}</span>
        <span class="res-pct">${pct}% (${o.votos||0} votos)</span>
      </div>
      <div class="res-bar"><div class="res-fill${winner?' winner':''}" style="width:0%" data-pct="${pct}"></div></div>
    </div>`;
  }).join('');
  setTimeout(()=>{
    document.querySelectorAll('.res-fill').forEach(el=>el.style.width=el.dataset.pct+'%');
  },100);
}

function mostrarError(){
  document.getElementById('loading').style.display='none';
  document.getElementById('error-view').style.display='block';
}

cargar();
</script>
</body>
</html>
